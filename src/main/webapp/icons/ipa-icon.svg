<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- iPhone body -->
  <rect x="5" y="2" width="14" height="20" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Speaker/top bar -->
  <rect x="10" y="4.5" width="4" height="1.5" rx="0.75" fill="currentColor"/>
  <!-- Home indicator -->
  <rect x="9.5" y="20" width="5" height="0.6" rx="0.3" fill="currentColor"/>
  <!-- Screen content: app grid dots -->
  <rect x="9" y="9" width="6" height="1" rx="0.5" fill="currentColor" opacity="0.7"/>
  <rect x="9" y="11.5" width="4" height="1" rx="0.5" fill="currentColor" opacity="0.5"/>
  <rect x="9" y="14" width="5" height="1" rx="0.5" fill="currentColor" opacity="0.3"/>
</svg>
